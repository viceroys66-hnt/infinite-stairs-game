<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>무한의 계단 - Quokka Stairs</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="wrap">
    <h1 class="title">무한의 계단</h1>
    <p class="subtitle">귀여운 쿼카와 함께!</p>
    <div class="game-area">
      <canvas id="gameCanvas" width="393" height="852"></canvas>
      <div id="touchOverlay" class="touch-overlay" aria-hidden="true"></div>
      <div class="game-overlay-buttons">
        <button type="button" id="btnStart" class="btn btn-start">게임 시작하기</button>
        <button type="button" id="btnRestart" class="btn btn-restart">다시 시작하기</button>
      </div>
      <div class="game-bottom-buttons">
        <button type="button" id="btnTurn" class="btn btn-turn">방향 전환</button>
        <button type="button" id="btnClimb" class="btn btn-climb">오르기</button>
      </div>
    </div>
    <p class="hint">왼쪽 화면=방향 전환 · 오른쪽 화면=오르기 (모바일 터치 지원)</p>
  </div>
  <script src="js/game-bundle.js"></script>
</body>
</html>
